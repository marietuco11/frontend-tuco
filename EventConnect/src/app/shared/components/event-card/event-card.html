<a class="card" [routerLink]="['/events', event?._id]">

  <div class="image-wrapper">
    <img [src]="getImage(event)"
         (error)="onImageError($event)"
         [alt]="event?.title">
  </div>

  <div class="info">
    <h3>{{ event?.title }}</h3>
    <p class="date">{{ event?.startDate | date:'dd/MM/yyyy HH:mm' }}</p>
    <p class="location">{{ event?.locationName }}</p>
    <p class="description">{{ event?.description | stripHtml }}...</p>
  </div>

</a>
