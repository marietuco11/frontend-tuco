<div class="card">

  <img [src]="event?.imageUrl || 'assets/placeholder.jpg'" [alt]="event?.title">

  <div class="info">

    <h3>{{ event?.title }}</h3>

    <p class="date">{{ event?.startDate | date:'dd/MM/yyyy HH:mm' }}</p>

    <p class="location">{{ event?.locationName }}</p>

    <p class="description">{{ event?.description | stripHtml }}...</p>

    <a [routerLink]="['/events', event?._id]">Ver más →</a>

  </div>

</div>
