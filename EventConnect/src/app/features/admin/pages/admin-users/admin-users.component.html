<app-admin-topbar title="Gestión de Usuarios"></app-admin-topbar>

<ng-container *ngIf="users$ | async as data">
  <section class="panel" *ngIf="data.isLoading">
    <p>Cargando usuarios...</p>
  </section>

  <section class="panel" *ngIf="data.errorMessage">
    <p>{{ data.errorMessage }}</p>
  </section>

  <section class="panel">
  <h2>Buscar y Filtrar</h2>

  <div class="filters">
    <input
      type="text"
      [(ngModel)]="search"
      placeholder="Buscar usuario..."
    >

    <select [(ngModel)]="selectedRole">
      <option value="Todos">Todos</option>
      <option value="Usuario">Usuario</option>
      <option value="Admin">Admin</option>
    </select>

    <button type="button">🔎 Buscar</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let user of filteredUsers(data.users)">
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.role }}</td>
          <td>
            <span
              class="status"
              [class.active]="user.status === 'Activo'"
              [class.banned]="user.status === 'Baneado'"
            >
              {{ user.status }}
            </span>
          </td>
          <td>
            <div class="actions">
              <button type="button" (click)="editUser(user)">✏</button>
              <button type="button" (click)="changeRole(user)">👁</button>
              <button type="button" (click)="deleteUser(user)">🗑</button>
            </div>
          </td>
        </tr>
        <tr *ngIf="!filteredUsers(data.users).length">
          <td colspan="5">No hay usuarios para mostrar.</td>
        </tr>
      </tbody>
    </table>
  </div>

    <p class="pagination">
      Mostrando {{ filteredUsers(data.users).length }} de {{ data.users.length }} usuarios
    </p>
  </section>
</ng-container>
